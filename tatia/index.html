<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#15090c" />
<title>Tatia's Birthday Party — Invitation</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,500;1,6..96,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Noto+Serif+Georgian:wght@300;400;500;600&display=swap" rel="stylesheet" />

<style>
  :root {
    --velvet: #160a0e;
    --shadow: #2c1820;
    --pearl: #F7EFE4;
    --ivory: #FBF6EC;
    --champagne: #EBD9BD;
    --blush: #E7B9BE;
    --gold: #C9A35E;
    --gold-light: #EBD3A0;
    --gold-deep: #A47E42;
    --ink: #5B4640;
  }

  * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--velvet);
    color: var(--ink);
    font-family: 'Noto Serif Georgian', serif;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  #stage-bg   { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  #particles  { position: fixed; inset: 0; z-index: 3; pointer-events: none; }
  #ambient    { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
  #confetti   { position: fixed; inset: 0; z-index: 90; pointer-events: none; }
  #root       { position: relative; z-index: 5; }

  .mesh {
    position: fixed; inset: -10%; z-index: 0; pointer-events: none;
    background:
      radial-gradient(60% 45% at 22% 18%, rgba(204,142,151,calc(0.30 + 0.25*var(--lum,0))), transparent 60%),
      radial-gradient(55% 40% at 82% 26%, rgba(201,163,94, calc(0.22 + 0.20*var(--lum,0))), transparent 58%),
      radial-gradient(70% 55% at 50% 100%, rgba(231,185,190,calc(0.10 + 0.30*var(--lum,0))), transparent 62%);
    filter: blur(14px);
    transition: opacity 0.6s ease;
  }

  .eyebrow {
    letter-spacing: 0.5em;
    text-transform: uppercase;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
  }

  .text-gold-grad {
    background: linear-gradient(100deg, #A87E3E 0%, #EBD3A0 32%, #C9A35E 52%, #F3E3BC 72%, #A87E3E 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    background-size: 240% 100%;
    animation: shimmer 8s linear infinite;
  }
  @keyframes shimmer { 0% { background-position: 0 0; } 100% { background-position: 240% 0; } }

  .sweep { position: relative; overflow: hidden; }
  .sweep::after {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(105deg, transparent 38%, rgba(255,247,228,0.85) 50%, transparent 62%);
    transform: translateX(-130%);
  }
  .sweep.go::after { animation: sweepmove 1.5s cubic-bezier(0.5,0,0.2,1) 0.2s both; }
  @keyframes sweepmove { to { transform: translateX(130%); } }

  .gold-rule { height: 1px; background: linear-gradient(90deg, transparent, rgba(201,163,94,0.85), transparent); }
  .gold-diamond {
    width: 6px; height: 6px; transform: rotate(45deg);
    background: linear-gradient(135deg, #EBD3A0, #A47E42);
    box-shadow: 0 0 10px rgba(201,163,94,0.7);
  }

  .glass {
    background: linear-gradient(150deg, rgba(255,252,246,0.50), rgba(255,250,242,0.18));
    backdrop-filter: blur(18px) saturate(1.15);
    -webkit-backdrop-filter: blur(18px) saturate(1.15);
    border: 1px solid rgba(255,255,255,0.55);
    box-shadow: 0 24px 60px -24px rgba(120,70,55,0.45), inset 0 1px 0 rgba(255,255,255,0.85);
  }
  .glass-border { position: relative; }
  .glass-border::before {
    content: ""; position: absolute; inset: 0; border-radius: inherit; padding: 1px;
    background: linear-gradient(140deg, rgba(235,211,160,0.95), rgba(255,255,255,0.05) 45%, rgba(231,185,190,0.8));
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
  }

  .btn-lux {
    position: relative; overflow: hidden;
    transition: transform 0.45s cubic-bezier(0.22,1,0.36,1), box-shadow 0.45s ease, letter-spacing 0.45s ease;
  }
  .btn-lux:active { transform: scale(0.96); }
  .btn-lux::after {
    content: ""; position: absolute; top: 0; left: -130%; width: 65%; height: 100%;
    background: linear-gradient(100deg, transparent, rgba(255,255,255,0.9), transparent);
    transition: left 0.85s ease;
  }
  .btn-lux:hover::after { left: 150%; }

  @keyframes cuepulse {
    0%   { transform: translateY(0); opacity: 0.35; }
    50%  { transform: translateY(8px); opacity: 1; }
    100% { transform: translateY(0); opacity: 0.35; }
  }
  .cue { animation: cuepulse 2.2s ease-in-out infinite; }

  @keyframes floaty { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
  .floaty { animation: floaty 7s ease-in-out infinite; }
  .floaty-s { animation: floaty 10s ease-in-out infinite; }

  .mask-line { overflow: hidden; }
  .mask-line > span { display: inline-block; transform: translateY(110%); }
  .mask-line.go > span { animation: maskup 1.1s cubic-bezier(0.22,1,0.36,1) both; }
  @keyframes maskup { to { transform: translateY(0); } }

  .clip-hidden { clip-path: inset(0 100% 0 0); }
  .draw-on { animation: drawclip 1.8s cubic-bezier(0.45,0,0.2,1) both; }
  @keyframes drawclip { from { clip-path: inset(0 100% 0 0); } to { clip-path: inset(0 0 0 0); } }

  @media (prefers-reduced-motion: reduce) {
    .text-gold-grad, .floaty, .floaty-s, .cue, .sweep.go::after { animation: none !important; }
  }

  #root:empty::after {
    content: ""; position: fixed; inset: 0;
    background: radial-gradient(circle at 50% 42%, #2c1820, #160a0e 70%);
  }

  /* Tailwind-equivalent utility classes used by the app */
  .flex { display: flex; }
  .flex-col { flex-direction: column; }
  .items-center { align-items: center; }
  .justify-center { justify-content: center; }
  .text-center { text-align: center; }
  .relative { position: relative; }
  .absolute { position: absolute; }
  .sticky { position: sticky; }
  .fixed { position: fixed; }
  .inset-0 { inset: 0; }
  .inset-3 { inset: 12px; }
  .top-0 { top: 0; }
  .top-1\/2 { top: 50%; }
  .left-1\/2 { left: 50%; }
  .overflow-hidden { overflow: hidden; }
  .pointer-events-none { pointer-events: none; }
  .select-none { user-select: none; }
  .w-full { width: 100%; }
  .h-full { height: 100%; }
  .w-7 { width: 28px; }
  .w-8 { width: 32px; }
  .w-10 { width: 40px; }
  .w-12 { width: 48px; }
  .w-1\.5 { width: 6px; }
  .h-1\.5 { height: 6px; }
  .block { display: block; }
  .inline-block { display: inline-block; }
  .hidden { display: none; }
  .gap-2 { gap: 8px; }
  .gap-3 { gap: 12px; }
  .mb-4 { margin-bottom: 16px; }
  .mb-5 { margin-bottom: 20px; }
  .mb-8 { margin-bottom: 32px; }
  .mt-1 { margin-top: 4px; }
  .mt-3 { margin-top: 12px; }
  .mt-4 { margin-top: 16px; }
  .mt-9 { margin-top: 36px; }
  .mt-10 { margin-top: 40px; }
  .my-5 { margin-top: 20px; margin-bottom: 20px; }
  .my-10 { margin-top: 40px; margin-bottom: 40px; }
  .mx-auto { margin-left: auto; margin-right: auto; }
  .px-6 { padding-left: 24px; padding-right: 24px; }
  .px-7 { padding-left: 28px; padding-right: 28px; }
  .px-8 { padding-left: 32px; padding-right: 32px; }
  .px-9 { padding-left: 36px; padding-right: 36px; }
  .px-12 { padding-left: 48px; padding-right: 48px; }
  .py-3\.5 { padding-top: 14px; padding-bottom: 14px; }
  .py-4 { padding-top: 16px; padding-bottom: 16px; }
  .py-12 { padding-top: 48px; padding-bottom: 48px; }
  .py-14 { padding-top: 56px; padding-bottom: 56px; }
  .rounded-full { border-radius: 9999px; }
  .rounded-\[22px\] { border-radius: 22px; }
  .rounded-\[28px\] { border-radius: 28px; }
  .rounded-\[30px\] { border-radius: 30px; }
  .rounded-\[16px\] { border-radius: 16px; }
  .max-w-\[20rem\] { max-width: 20rem; }
  .max-w-\[22rem\] { max-width: 22rem; }
  .font-display { font-family: 'Bodoni Moda', serif; }
  .font-serif { font-family: 'Cormorant Garamond', serif; }
  .font-geo { font-family: 'Noto Serif Georgian', serif; }
  .italic { font-style: italic; }
  .leading-none { line-height: 1; }
  .leading-tight { line-height: 1.25; }
  .leading-\[0\.92\] { line-height: 0.92; }
  .leading-\[1\.15\] { line-height: 1.15; }
  .leading-\[1\.85\] { line-height: 1.85; }
  .leading-\[1\.95\] { line-height: 1.95; }
  .tracking-tight { letter-spacing: -0.025em; }
  .tracking-\[0\.02em\] { letter-spacing: 0.02em; }
  .tracking-\[0\.06em\] { letter-spacing: 0.06em; }
  .tracking-\[0\.14em\] { letter-spacing: 0.14em; }
  .tracking-\[0\.18em\] { letter-spacing: 0.18em; }
  .tracking-\[0\.2em\] { letter-spacing: 0.2em; }
  .tracking-\[0\.3em\] { letter-spacing: 0.3em; }
  .tracking-\[0\.34em\] { letter-spacing: 0.34em; }
  .tracking-\[0\.42em\] { letter-spacing: 0.42em; }
  .-translate-x-1\/2 { transform: translateX(-50%); }
  .-translate-y-1\/2 { transform: translateY(-50%); }
  .z-10 { z-index: 10; }
  .text-pearl { color: #F7EFE4; }
  .text-pearl\/80 { color: rgba(247,239,228,0.8); }
  .text-pearl\/55 { color: rgba(247,239,228,0.55); }
  .text-ink { color: #5B4640; }
  .text-ink-soft { color: #8A7268; }
  .text-gold-deep { color: #A47E42; }
  .text-velvet { color: #160a0e; }
  .transition-all { transition: all; }
  .duration-700 { transition-duration: 700ms; }
  .aspect-ratio-1 { aspect-ratio: 1; }
  .w-\[16px\] { width: 16px; }
  .h-\[24px\] { height: 24px; }
  .floaty { animation: floaty 7s ease-in-out infinite; }
  .floaty-s { animation: floaty 10s ease-in-out infinite; }
</style>
</head>
<body>
  <div class="mesh" id="mesh"></div>
  <canvas id="ambient"></canvas>
  <canvas id="particles"></canvas>
  <div id="root"></div>
  <canvas id="confetti"></canvas>
  <script type="module" src="./main.jsx"></script>
</body>
</html>
